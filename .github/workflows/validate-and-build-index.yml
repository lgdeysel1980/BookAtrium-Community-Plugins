name: Validate and build index

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout registry
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          # jsonschema is optional; structural validator does not require it.
          python -m pip install "jsonschema==4.23.0"

      - name: Validate plugin manifests
        run: python scripts/validate_registry.py --plugins-dir plugins --schema schemas/community-plugin.schema.json --publication

      - name: Generate deterministic index
        run: |
          # Preserve committed generatedAtUtc when regenerating for staleness comparison.
          EXISTING_TS=$(python -c "import json; print(json.load(open('generated/index.json',encoding='utf-8')).get('generatedAtUtc') or '')" 2>/dev/null || true)
          if [ -n "$EXISTING_TS" ]; then
            python scripts/generate_index.py --plugins-dir plugins --output-dir generated --generated-at "$EXISTING_TS"
          else
            python scripts/generate_index.py --plugins-dir plugins --output-dir generated
          fi

      - name: Fail if generated files are stale
        run: |
          git diff --exit-code -- generated/index.json generated/index.json.gz \
            || (echo "error: generated index is stale; regenerate with scripts/generate_index.py and commit" >&2; exit 1)

      - name: Secret, placeholder, and content-policy scan
        run: |
          # Flags forbidden packages, policy wording, mojibake, secrets, placeholders.
          python scripts/scan_public_export.py --root .

      - name: Upload generated catalogue artifact
        uses: actions/upload-artifact@v4
        with:
          name: community-plugin-index
          path: |
            generated/index.json
            generated/index.json.gz
